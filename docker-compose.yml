services:
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    ports:
      - "8081:8081"
      - "1234:1234"
    environment:
      ENABLE_EXPLORER: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/_explorer/emulator.pem"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

