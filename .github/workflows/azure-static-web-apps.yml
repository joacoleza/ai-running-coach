name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Build API
        run: cd api && npm run build

      - name: Prune API dev dependencies
        run: cd api && npm prune --production

      - name: Check artifact sizes
        run: |
          echo "=== API folder size after prune ==="
          du -sh api/
          du -sh api/node_modules/
          echo "=== Top 10 largest API deps ==="
          du -sh api/node_modules/* | sort -rh | head -10
          echo "=== Web dist size ==="
          du -sh web/dist/ 2>/dev/null || echo "web/dist not built yet"

      - name: Build and Deploy
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_HILL_0974DDA10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "web"
          api_location: "api"
          output_location: "dist"
          skip_api_build: true
