name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: '7.0'

      - name: Install root deps
        run: npm ci

      - name: Install web deps
        run: cd web && npm ci

      - name: Install API deps
        run: cd api && npm ci

      - name: Run API tests
        run: cd api && npx vitest run
        env:
          MONGODB_CONNECTION_STRING: mongodb://localhost:27017
          APP_PASSWORD: ci-test-password

      - name: Run web tests with coverage
        run: cd web && npx vitest run --coverage

      - name: Install Azure Functions Core Tools
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg > /dev/null
          echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-jammy-prod jammy main" | sudo tee /etc/apt/sources.list.d/azure-functions.list
          sudo apt-get update -qq
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          MONGODB_CONNECTION_STRING: mongodb://localhost:27017
          APP_PASSWORD: ci-test-password
          CI: true

  coverage-badges:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install web deps
        run: cd web && npm ci

      - name: Run web tests with coverage
        run: cd web && npx vitest run --coverage

      - name: Generate coverage badges
        uses: jpb06/coverage-badges-action@latest
        with:
          coverage-summary-path: ./web/coverage/coverage-summary.json
          output-folder: ./badges
          no-commit: true

      - name: Push badges to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create orphan badges branch content
          mkdir -p /tmp/badges-deploy
          cp -r ./badges/* /tmp/badges-deploy/
          git fetch origin badges:badges 2>/dev/null || true
          git checkout --orphan badges-tmp
          git rm -rf .
          mkdir badges
          cp /tmp/badges-deploy/* badges/
          git add badges/
          git commit -m "Update coverage badges [skip ci]"
          git push origin HEAD:badges --force
